# L.U.N.A. — Business variant
#
# Full-stack: Luna backend + Ollama (swap for cloud in .env.business.example)
# Rate limiting, JWT auth, and professional persona are enabled via .env.
#
# Quick start:
#   cp .env.business.example .env
#   # Edit .env — set luna_api_key, jwt_secret, business_name, llm_provider
#   docker compose -f compose.business.yml up -d
#   open http://localhost:8899
#
# With NVIDIA GPU:
#   docker compose -f compose.business.yml -f compose.gpu.yml up -d
#
# Cloud LLM only (no Ollama):
#   Remove the 'ollama' service and its depends_on below, set llm_provider=anthropic (etc.) in .env

services:

  # ── Ollama — local LLM inference (optional if using cloud provider) ──────────
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── Luna — business backend + frontend ────────────────────────────────────────
  luna:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8899:8899"
    env_file:
      - .env
    environment:
      # Force business variant and production-safe defaults
      - luna_variant=business
      - host=0.0.0.0
      - ollama_base_url=http://ollama:11434
      - rate_limit_enabled=true
      - rate_limit_per_minute=60
      - rate_limit_burst=20
    volumes:
      - luna_data:/app/data
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    # Production healthcheck
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8899/api/system/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Optional: nginx reverse proxy with HTTPS ─────────────────────────────────
  # Uncomment and configure certbot / Let's Encrypt for production HTTPS.
  # nginx:
  #   image: nginx:alpine
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
  #     - ./certs:/etc/nginx/certs:ro
  #   depends_on:
  #     - luna
  #   restart: unless-stopped

volumes:
  ollama_data:
    driver: local
  luna_data:
    driver: local

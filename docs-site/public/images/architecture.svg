<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#03101f" />
    </linearGradient>
  </defs>
  <rect width="900" height="420" rx="24" fill="url(#bg)" />
  <text x="45" y="55" fill="#7dd3fc" font-size="28" font-family="Inter, sans-serif" font-weight="700">L.U.N.A. Architecture</text>
  <rect x="60" y="100" width="240" height="120" rx="22" fill="#111827" stroke="#334155" stroke-width="2" />
  <text x="180" y="140" fill="#e2e8f0" font-size="18" text-anchor="middle" font-family="Inter, sans-serif">Electron Shell</text>
  <text x="180" y="165" fill="#94a3b8" font-size="14" text-anchor="middle" font-family="Inter, sans-serif">Desktop host + UI</text>

  <rect x="330" y="100" width="240" height="120" rx="22" fill="#111827" stroke="#334155" stroke-width="2" />
  <text x="450" y="140" fill="#e2e8f0" font-size="18" text-anchor="middle" font-family="Inter, sans-serif">React Frontend</text>
  <text x="450" y="165" fill="#94a3b8" font-size="14" text-anchor="middle" font-family="Inter, sans-serif">Chat, widgets, dashboard</text>

  <rect x="600" y="100" width="240" height="120" rx="22" fill="#111827" stroke="#334155" stroke-width="2" />
  <text x="720" y="140" fill="#e2e8f0" font-size="18" text-anchor="middle" font-family="Inter, sans-serif">FastAPI Backend</text>
  <text x="720" y="165" fill="#94a3b8" font-size="14" text-anchor="middle" font-family="Inter, sans-serif">LLMs, memory, vision, tools</text>

  <path d="M300 160 H330" stroke="#7dd3fc" stroke-width="3" marker-end="url(#arrow)" />
  <path d="M570 160 H600" stroke="#7dd3fc" stroke-width="3" marker-end="url(#arrow)" />
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 Z" fill="#7dd3fc" />
    </marker>
  </defs>

  <rect x="60" y="260" width="780" height="110" rx="22" fill="#0f172a" stroke="#334155" stroke-width="2" />
  <text x="450" y="305" fill="#cbd5e1" font-size="18" text-anchor="middle" font-family="Inter, sans-serif">Shared local services</text>
  <text x="450" y="340" fill="#94a3b8" font-size="14" text-anchor="middle" font-family="Inter, sans-serif">Spotify, calendar, web search, vision, task scheduler</text>
</svg>
<svg viewBox="0 0 1200 380" xmlns="http://www.w3.org/2000/svg" font-family="'Inter', 'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f0f14"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="baseGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="engineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="barBlue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="barPurple" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="380" fill="url(#bg)" rx="16"/>

  <!-- Grid lines -->
  <line x1="60" y1="30" x2="60" y2="330" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="60" y1="330" x2="1140" y2="330" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Title -->
  <text x="600" y="24" fill="#a0a0c0" font-size="11" text-anchor="middle" font-weight="500" letter-spacing="2">LUNA BENCHMARK SUITE — BEFORE vs AFTER ENGINE</text>

  <!-- ═══════════════════════════════════════════════════════════════
       LEFT PANEL: Before/After TTFT comparison bars
       ═══════════════════════════════════════════════════════════════ -->
  <text x="80" y="60" fill="#ffffff" font-size="14" font-weight="700">Time to First Token (TTFT)</text>
  <text x="80" y="76" fill="#6b6b8a" font-size="11">Baseline vs Luna Engine — lower is better</text>

  <!-- Probe labels + bars -->
  <!-- echo -->
  <text x="80" y="112" fill="#9090b0" font-size="11">echo</text>
  <rect x="80" y="116" width="140" height="14" rx="3" fill="url(#barBlue)" opacity="0.9"/>
  <rect x="80" y="132" width="153" height="14" rx="3" fill="url(#barPurple)" opacity="0.85"/>
  <text x="228" y="127" fill="#60a5fa" font-size="10" dx="4">180ms</text>
  <text x="241" y="143" fill="#a78bfa" font-size="10" dx="4">198ms</text>

  <!-- arithmetic -->
  <text x="80" y="162" fill="#9090b0" font-size="11">arithmetic</text>
  <rect x="80" y="166" width="210" height="14" rx="3" fill="url(#barBlue)" opacity="0.9"/>
  <rect x="80" y="182" width="224" height="14" rx="3" fill="url(#barPurple)" opacity="0.85"/>
  <text x="298" y="177" fill="#60a5fa" font-size="10" dx="4">270ms</text>
  <text x="312" y="193" fill="#a78bfa" font-size="10" dx="4">288ms</text>

  <!-- short-list -->
  <text x="80" y="212" fill="#9090b0" font-size="11">short-list</text>
  <rect x="80" y="216" width="280" height="14" rx="3" fill="url(#barBlue)" opacity="0.9"/>
  <rect x="80" y="232" width="294" height="14" rx="3" fill="url(#barPurple)" opacity="0.85"/>
  <text x="368" y="227" fill="#60a5fa" font-size="10" dx="4">360ms</text>
  <text x="382" y="243" fill="#a78bfa" font-size="10" dx="4">378ms</text>

  <!-- medium (long-form) -->
  <text x="80" y="262" fill="#9090b0" font-size="11">medium ★</text>
  <rect x="80" y="266" width="320" height="14" rx="3" fill="url(#barBlue)" opacity="0.9"/>
  <rect x="80" y="282" width="337" height="14" rx="3" fill="url(#barPurple)" opacity="0.85"/>
  <text x="408" y="277" fill="#60a5fa" font-size="10" dx="4">412ms</text>
  <text x="425" y="293" fill="#a78bfa" font-size="10" dx="4">433ms</text>

  <!-- long (long-form) -->
  <text x="80" y="312" fill="#9090b0" font-size="11">long ★</text>
  <rect x="80" y="316" width="360" height="14" rx="3" fill="url(#barBlue)" opacity="0.9"/>
  <rect x="80" y="332" width="378" height="14" rx="3" fill="url(#barPurple)" opacity="0.85"/>
  <text x="448" y="327" fill="#60a5fa" font-size="10" dx="4">463ms</text>
  <text x="466" y="343" fill="#a78bfa" font-size="10" dx="4">486ms</text>

  <!-- Legend (left) -->
  <rect x="80" y="356" width="10" height="8" rx="2" fill="#3b82f6"/>
  <text x="94" y="364" fill="#6b6b8a" font-size="10">Baseline (raw LLM)</text>
  <rect x="210" y="356" width="10" height="8" rx="2" fill="#8b5cf6"/>
  <text x="224" y="364" fill="#6b6b8a" font-size="10">Luna Engine</text>
  <text x="80" y="376" fill="#4b5563" font-size="9">★ long-form prompts also report tok/s</text>

  <!-- Divider -->
  <line x1="570" y1="50" x2="570" y2="345" stroke="#ffffff" stroke-opacity="0.07" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- ═══════════════════════════════════════════════════════════════
       RIGHT PANEL: 6 suite metric cards
       ═══════════════════════════════════════════════════════════════ -->
  <text x="600" y="60" fill="#ffffff" font-size="14" font-weight="700">All 8 Benchmark Suites</text>
  <text x="600" y="76" fill="#6b6b8a" font-size="11">Run python scripts/run_benchmark.py --suite all</text>

  <!-- Row 1 -->
  <!-- Memory card -->
  <rect x="600" y="92" width="170" height="76" rx="8" fill="#ffffff" fill-opacity="0.04" stroke="#3b82f6" stroke-opacity="0.25" stroke-width="1"/>
  <text x="616" y="113" fill="#60a5fa" font-size="11" font-weight="700">MEMORY</text>
  <text x="616" y="130" fill="#e0e0f0" font-size="18" font-weight="800" filter="url(#glow)">8 ms</text>
  <text x="616" y="145" fill="#6b6b8a" font-size="10">retrieval p50</text>
  <text x="616" y="158" fill="#6b6b8a" font-size="10">ChromaDB vector search</text>

  <!-- Tools card -->
  <rect x="785" y="92" width="170" height="76" rx="8" fill="#ffffff" fill-opacity="0.04" stroke="#10b981" stroke-opacity="0.25" stroke-width="1"/>
  <text x="801" y="113" fill="#34d399" font-size="11" font-weight="700">TOOLS</text>
  <text x="801" y="130" fill="#e0e0f0" font-size="18" font-weight="800" filter="url(#glow)">100%</text>
  <text x="801" y="145" fill="#6b6b8a" font-size="10">success rate</text>
  <text x="801" y="158" fill="#6b6b8a" font-size="10">workspace + web search</text>

  <!-- Agent card -->
  <rect x="970" y="92" width="170" height="76" rx="8" fill="#ffffff" fill-opacity="0.04" stroke="#f59e0b" stroke-opacity="0.25" stroke-width="1"/>
  <text x="986" y="113" fill="#fbbf24" font-size="11" font-weight="700">AGENT</text>
  <text x="986" y="130" fill="#e0e0f0" font-size="18" font-weight="800" filter="url(#glow)">83%</text>
  <text x="986" y="145" fill="#6b6b8a" font-size="10">routing accuracy</text>
  <text x="986" y="158" fill="#6b6b8a" font-size="10">tool selection from registry</text>

  <!-- Row 2 -->
  <!-- Voice card -->
  <rect x="600" y="182" width="170" height="76" rx="8" fill="#ffffff" fill-opacity="0.04" stroke="#ec4899" stroke-opacity="0.25" stroke-width="1"/>
  <text x="616" y="203" fill="#f472b6" font-size="11" font-weight="700">VOICE</text>
  <text x="616" y="220" fill="#e0e0f0" font-size="18" font-weight="800" filter="url(#glow)">320 ms</text>
  <text x="616" y="235" fill="#6b6b8a" font-size="10">TTS latency p50</text>
  <text x="616" y="248" fill="#6b6b8a" font-size="10">edge-tts + STT availability</text>

  <!-- Quality card -->
  <rect x="785" y="182" width="170" height="76" rx="8" fill="#ffffff" fill-opacity="0.04" stroke="#8b5cf6" stroke-opacity="0.25" stroke-width="1"/>
  <text x="801" y="203" fill="#a78bfa" font-size="11" font-weight="700">QUALITY</text>
  <text x="801" y="220" fill="#e0e0f0" font-size="18" font-weight="800" filter="url(#glow)">87%</text>
  <text x="801" y="235" fill="#6b6b8a" font-size="10">instruction score</text>
  <text x="801" y="248" fill="#6b6b8a" font-size="10">8-probe following battery</text>

  <!-- System card -->
  <rect x="970" y="182" width="170" height="76" rx="8" fill="#ffffff" fill-opacity="0.04" stroke="#06b6d4" stroke-opacity="0.25" stroke-width="1"/>
  <text x="986" y="203" fill="#22d3ee" font-size="11" font-weight="700">SYSTEM</text>
  <text x="986" y="220" fill="#e0e0f0" font-size="18" font-weight="800" filter="url(#glow)">+42 MB</text>
  <text x="986" y="235" fill="#6b6b8a" font-size="10">RAM delta</text>
  <text x="986" y="248" fill="#6b6b8a" font-size="10">CPU + VRAM monitoring</text>

  <!-- Before/After summary box -->
  <rect x="600" y="272" width="540" height="68" rx="8" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <text x="870" y="293" fill="#9090b0" font-size="10" text-anchor="middle" font-weight="500" letter-spacing="1">BEFORE vs AFTER LUNA ENGINE</text>

  <!-- Baseline pill -->
  <rect x="616" y="302" width="120" height="28" rx="6" fill="#3b82f6" fill-opacity="0.15" stroke="#3b82f6" stroke-opacity="0.4" stroke-width="1"/>
  <text x="676" y="312" fill="#60a5fa" font-size="9" text-anchor="middle" font-weight="600">BASELINE (RAW LLM)</text>
  <text x="676" y="323" fill="#e0e0f0" font-size="11" text-anchor="middle" font-weight="700">320 ms p50</text>

  <!-- Arrow -->
  <text x="757" y="319" fill="#6b6b8a" font-size="18" text-anchor="middle">→</text>

  <!-- Engine pill -->
  <rect x="776" y="302" width="120" height="28" rx="6" fill="#8b5cf6" fill-opacity="0.15" stroke="#8b5cf6" stroke-opacity="0.4" stroke-width="1"/>
  <text x="836" y="312" fill="#a78bfa" font-size="9" text-anchor="middle" font-weight="600">LUNA ENGINE</text>
  <text x="836" y="323" fill="#e0e0f0" font-size="11" text-anchor="middle" font-weight="700">338 ms p50</text>

  <!-- Delta -->
  <text x="917" y="319" fill="#6b6b8a" font-size="12" text-anchor="middle">+18 ms</text>

  <!-- What Luna adds -->
  <text x="960" y="307" fill="#6b6b8a" font-size="9">memory retrieval</text>
  <text x="960" y="318" fill="#6b6b8a" font-size="9">+ context injection</text>
  <text x="960" y="329" fill="#34d399" font-size="9">+ persona + history</text>

  <!-- Throughput unchanged note -->
  <text x="600" y="352" fill="#4b5563" font-size="10">Throughput (tok/s) is unaffected by the engine — decode speed depends only on the model and hardware.</text>
</svg>

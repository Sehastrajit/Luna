<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" fill="none">
  <rect width="900" height="380" rx="24" fill="#020617" />
  <text x="45" y="55" fill="#7dd3fc" font-size="28" font-family="Inter, sans-serif" font-weight="700">CLI Workflow</text>

  <rect x="80" y="100" width="240" height="90" rx="18" fill="#111827" stroke="#334155" stroke-width="2" />
  <text x="200" y="140" fill="#e2e8f0" font-size="18" text-anchor="middle" font-family="Inter, sans-serif">luna CLI</text>
  <text x="200" y="165" fill="#94a3b8" font-size="14" text-anchor="middle" font-family="Inter, sans-serif">npm run luna -- &lt;command&gt;</text>

  <rect x="330" y="100" width="240" height="90" rx="18" fill="#111827" stroke="#334155" stroke-width="2" />
  <text x="450" y="140" fill="#e2e8f0" font-size="18" text-anchor="middle" font-family="Inter, sans-serif">Repo scripts</text>
  <text x="450" y="165" fill="#94a3b8" font-size="14" text-anchor="middle" font-family="Inter, sans-serif">frontend/backend/electron</text>

  <path d="M320 145 H330" stroke="#7dd3fc" stroke-width="3" marker-end="url(#arrow2)" />

  <defs>
    <marker id="arrow2" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 Z" fill="#7dd3fc" />
    </marker>
  </defs>

  <rect x="580" y="60" width="240" height="70" rx="18" fill="#111827" stroke="#334155" stroke-width="2" />
  <text x="700" y="95" fill="#e2e8f0" font-size="16" text-anchor="middle" font-family="Inter, sans-serif">dev</text>
  <text x="700" y="118" fill="#94a3b8" font-size="13" text-anchor="middle" font-family="Inter, sans-serif">Vite + Electron</text>

  <rect x="580" y="160" width="240" height="70" rx="18" fill="#111827" stroke="#334155" stroke-width="2" />
  <text x="700" y="195" fill="#e2e8f0" font-size="16" text-anchor="middle" font-family="Inter, sans-serif">backend</text>
  <text x="700" y="218" fill="#94a3b8" font-size="13" text-anchor="middle" font-family="Inter, sans-serif">FastAPI only</text>

  <rect x="580" y="260" width="240" height="70" rx="18" fill="#111827" stroke="#334155" stroke-width="2" />
  <text x="700" y="295" fill="#e2e8f0" font-size="16" text-anchor="middle" font-family="Inter, sans-serif">frontend</text>
  <text x="700" y="318" fill="#94a3b8" font-size="13" text-anchor="middle" font-family="Inter, sans-serif">Vite only</text>

  <path d="M430 120 L570 95" stroke="#7dd3fc" stroke-width="3" marker-end="url(#arrow2)" />
  <path d="M430 170 L570 170" stroke="#7dd3fc" stroke-width="3" marker-end="url(#arrow2)" />
  <path d="M430 270 L570 245" stroke="#7dd3fc" stroke-width="3" marker-end="url(#arrow2)" />

# Alembic configuration for Luna
# Run migrations: alembic upgrade head
# Create a new migration: alembic revision --autogenerate -m "description"
# Check current revision: alembic current
# Show history: alembic history

[alembic]
script_location = alembic
prepend_sys_path = .

# Database URL is resolved from Luna's settings at runtime (alembic/env.py).
# Do NOT set sqlalchemy.url here — it is read from .env via backend.config.settings.
sqlalchemy.url =

file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s
timezone = UTC
truncate_slug_length = 40

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

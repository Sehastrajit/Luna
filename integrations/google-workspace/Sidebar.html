<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <base target="_top"/>
  <style>
    :root {
      --bg:      #0f1117; --surface: #161b27; --card: #1e2535;
      --border:  #2a3347; --primary: #7c6af7; --text: #e2e8f0;
      --dim:     #64748b; --user-bg: #2d2060; --error: #f87171; --ok: #34d399;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
    }
    /* messages */
    #messages {
      flex: 1; overflow-y: auto; padding: 10px 12px;
      display: flex; flex-direction: column; gap: 8px;
    }
    #messages::-webkit-scrollbar { width: 3px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .msg { display: flex; flex-direction: column; max-width: 92%; gap: 2px; }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.luna { align-self: flex-start; }
    .bubble {
      padding: 7px 10px; border-radius: 10px; line-height: 1.5;
      white-space: pre-wrap; word-break: break-word; font-size: 12px;
    }
    .msg.user .bubble { background: var(--user-bg); color: #c4b5fd; border-bottom-right-radius: 2px; }
    .msg.luna .bubble { background: var(--card); border: 1px solid var(--border); border-bottom-left-radius: 2px; }
    .lbl { font-size: 10px; color: var(--dim); padding: 0 3px; }
    .streaming::after { content: '▋'; animation: blink .7s step-end infinite; color: var(--primary); }
    @keyframes blink { 50% { opacity: 0; } }
    .copy-row { display: flex; gap: 4px; margin-top: 2px; }
    .copy-row button {
      font-size: 10px; background: var(--card); border: 1px solid var(--border);
      color: var(--dim); border-radius: 4px; padding: 1px 5px; cursor: pointer;
    }
    .copy-row button:hover { color: var(--text); }
    /* status */
    #status { font-size: 11px; color: var(--dim); padding: 3px 12px; min-height: 18px; flex-shrink: 0; }
    #status.err { color: var(--error); } #status.ok { color: var(--ok); }
    /* action row */
    #action-row {
      display: flex; gap: 5px; padding: 5px 12px; flex-shrink: 0; flex-wrap: wrap;
    }
    #action-row button {
      flex: 1; min-width: 70px; background: var(--card); border: 1px solid var(--border);
      color: var(--text); border-radius: 6px; padding: 5px 4px; cursor: pointer;
      font-size: 11px; transition: border-color .15s;
    }
    #action-row button:hover { border-color: var(--primary); color: var(--primary); }
    #action-row button:disabled { opacity: .4; cursor: default; }
    /* input */
    #input-row {
      display: flex; align-items: flex-end; gap: 6px;
      padding: 6px 12px 10px; border-top: 1px solid var(--border); flex-shrink: 0;
    }
    #msg-input {
      flex: 1; background: var(--card); border: 1px solid var(--border);
      color: var(--text); border-radius: 8px; padding: 7px 9px;
      font-size: 12px; font-family: inherit; resize: none; outline: none;
      min-height: 34px; max-height: 100px; line-height: 1.4;
    }
    #msg-input:focus { border-color: var(--primary); }
    #msg-input::placeholder { color: var(--dim); }
    #send-btn {
      background: var(--primary); border: none; color: white;
      width: 32px; height: 32px; border-radius: 8px; cursor: pointer;
      flex-shrink: 0; font-size: 15px;
    }
    #send-btn:disabled { opacity: .4; cursor: default; }
  </style>
</head>
<body>

<div id="messages">
  <div class="msg luna">
    <span class="lbl">Luna</span>
    <div class="bubble">Hello! I'm Luna. Use "Use Selection" to send selected text, or just ask me anything about your <?= hostType ?>.</div>
  </div>
</div>

<div id="status"></div>

<div id="action-row">
  <button id="btn-sel">Use selection</button>
  <button id="btn-doc">Read document</button>
  <button id="btn-ins" disabled>Insert response</button>
</div>

<div id="input-row">
  <textarea id="msg-input" rows="1" placeholder="Ask Luna…"></textarea>
  <button id="send-btn">&#9658;</button>
</div>

<script>
const HOST_TYPE = '<?= hostType ?>';
let lastResponse = '';
let busy = false;

// Auto-grow textarea
const ta = document.getElementById('msg-input');
ta.addEventListener('input', () => {
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 100) + 'px';
});
ta.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
document.getElementById('send-btn').addEventListener('click', sendMessage);
document.getElementById('btn-sel').addEventListener('click', useSelection);
document.getElementById('btn-doc').addEventListener('click', readDocument);
document.getElementById('btn-ins').addEventListener('click', insertResponse);

function setStatus(msg, cls) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = cls || '';
}

function scrollBottom() {
  const el = document.getElementById('messages');
  el.scrollTop = el.scrollHeight;
}

function setEnabled(v) {
  busy = !v;
  document.getElementById('msg-input').disabled = !v;
  document.getElementById('send-btn').disabled  = !v;
}

function addMsg(role, text, id) {
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role;
  if (id) wrap.id = id;

  const lbl = document.createElement('span');
  lbl.className = 'lbl';
  lbl.textContent = role === 'luna' ? 'Luna' : 'You';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;

  wrap.appendChild(lbl);
  wrap.appendChild(bubble);

  if (role === 'luna') {
    const row = document.createElement('div');
    row.className = 'copy-row';

    const copyBtn = document.createElement('button');
    copyBtn.textContent = 'Copy';
    copyBtn.onclick = () => {
      const ta = document.createElement('textarea');
      ta.value = bubble.textContent;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      copyBtn.textContent = 'Copied!';
      setTimeout(() => copyBtn.textContent = 'Copy', 1500);
    };
    row.appendChild(copyBtn);
    wrap.appendChild(row);
  }

  document.getElementById('messages').appendChild(wrap);
  scrollBottom();
  return bubble;
}

function sendMessage(textOverride) {
  if (busy) return;
  const text = (textOverride || ta.value).trim();
  if (!text) return;
  ta.value = '';
  ta.style.height = 'auto';

  addMsg('user', text);
  setEnabled(false);
  setStatus('Luna is thinking…');

  const bid   = 'b' + Date.now();
  const bubble = addMsg('luna', '…', bid);
  bubble.classList.add('streaming');

  google.script.run
    .withSuccessHandler(result => {
      bubble.classList.remove('streaming');
      if (result.ok) {
        bubble.textContent = result.text;
        lastResponse = result.text;
        document.getElementById('btn-ins').disabled = false;
        setStatus('');
      } else {
        bubble.textContent = 'Error: ' + result.error;
        setStatus('Connection failed — check settings.', 'err');
      }
      setEnabled(true);
      scrollBottom();
    })
    .withFailureHandler(err => {
      bubble.classList.remove('streaming');
      bubble.textContent = 'Error: ' + err.message;
      setStatus('Failed.', 'err');
      setEnabled(true);
    })
    .chatWithLuna(text, HOST_TYPE);
}

function useSelection() {
  if (busy) return;
  setStatus('Reading selection…');

  const fn =
    HOST_TYPE === 'spreadsheet' ? 'getSheetSelection' :
    HOST_TYPE === 'presentation' ? 'getSlideSelection' :
    'getSelectionText';

  google.script.run
    .withSuccessHandler(sel => {
      if (!sel || !sel.trim()) {
        setStatus('Nothing selected — select text first.', 'err');
        return;
      }
      setStatus('');
      sendMessage('[Selected ' + HOST_TYPE + ' content]:\n\n' + sel);
    })
    .withFailureHandler(err => setStatus('Selection error: ' + err.message, 'err'))
    [fn]();
}

function readDocument() {
  if (busy) return;
  setStatus('Reading document…');

  const fn =
    HOST_TYPE === 'spreadsheet'  ? 'getSheetSummary'   :
    HOST_TYPE === 'presentation' ? 'getSlideSelection'  :
    'getDocumentSummary';

  google.script.run
    .withSuccessHandler(text => {
      if (!text || !text.trim()) {
        setStatus('Document is empty or cannot be read.', 'err');
        return;
      }
      setStatus('');
      sendMessage('[' + HOST_TYPE + ' content (first 3000 chars)]:\n\n' + text + '\n\nPlease summarise or answer questions about this.');
    })
    .withFailureHandler(err => setStatus('Read error: ' + err.message, 'err'))
    [fn]();
}

function insertResponse() {
  if (!lastResponse) return;
  const fn = HOST_TYPE === 'spreadsheet' ? 'insertCellValue' : 'insertTextAtCursor';
  google.script.run
    .withSuccessHandler(r => {
      if (r.ok) setStatus('Inserted into document ✓', 'ok');
      else      setStatus('Insert failed: ' + r.error, 'err');
    })
    .withFailureHandler(err => setStatus('Insert error: ' + err.message, 'err'))
    [fn](lastResponse);
}
</script>
</body>
</html>

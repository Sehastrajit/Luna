<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="moonGrad" x1="4" y1="4" x2="44" y2="44" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ddd6fe"/>
      <stop offset="0.45" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#4c1d95"/>
    </linearGradient>
    <mask id="moonMask">
      <rect width="48" height="48" fill="white"/>
      <circle cx="32" cy="18" r="16" fill="black"/>
    </mask>
  </defs>
  <!-- Crescent moon -->
  <circle cx="21" cy="27" r="19" fill="url(#moonGrad)" mask="url(#moonMask)"/>
  <!-- Orbital ring arc -->
  <ellipse cx="26" cy="22" rx="21" ry="8" stroke="#a78bfa" stroke-width="1.2" stroke-linecap="round" stroke-dasharray="3 4" opacity="0.45" transform="rotate(-28 26 22)"/>
  <!-- Stars -->
  <circle cx="40" cy="9" r="1.8" fill="#ddd6fe" opacity="0.85"/>
  <circle cx="7" cy="8" r="1.1" fill="#c4b5fd" opacity="0.65"/>
  <circle cx="43" cy="34" r="1.1" fill="#c4b5fd" opacity="0.5"/>
</svg>

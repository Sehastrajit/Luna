# L.U.N.A. — default stack (CPU Ollama + Luna backend)
#
# Quick start:
#   cp .env.example .env   # edit ollama_model if needed
#   docker compose up -d
#   open http://localhost:8899
#
# With NVIDIA GPU:
#   docker compose -f compose.yml -f compose.gpu.yml up -d
#
# With cloud LLM (no Ollama):
#   docker compose -f compose.cloud.yml up -d

services:

  # ── Ollama — local LLM inference ──────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── Luna backend + frontend ────────────────────────────────────────────────
  luna:
    build:
      context: .
      dockerfile: Dockerfile
    # Uncomment once published to GHCR:
    # image: ghcr.io/sehastrajit/luna:latest
    ports:
      - "8899:8899"
    env_file:
      - .env
    environment:
      # Override host and Ollama URL for Docker networking
      - host=0.0.0.0
      - ollama_base_url=http://ollama:11434
    volumes:
      - luna_data:/app/data
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ollama_data:
    driver: local
  luna_data:
    driver: local
